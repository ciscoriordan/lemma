name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build basic dictionary
        run: python3 greek_kindle_dictionary.py

      - name: Run tests
        run: python3 test_dictionary_lookup.py 'lemma_greek_en_*_basic'
