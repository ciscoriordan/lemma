name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lemma

      - uses: actions/checkout@v4
        with:
          repository: ciscoriordan/kindling
          path: kindling

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Wire local kindling
        working-directory: lemma
        run: KINDLING_PATH=$GITHUB_WORKSPACE/kindling ./scripts/setup-local-kindling.sh

      - name: Build release
        working-directory: lemma
        run: cargo build --release

      - name: Run unit tests
        working-directory: lemma
        run: cargo test --release

      - name: Build dictionary
        working-directory: lemma
        run: ./target/release/lemma

      - name: Run integration tests against built dictionary
        working-directory: lemma
        run: ./target/release/test_dictionary_lookup lemma_greek_en
